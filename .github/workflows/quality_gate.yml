name: Quality Gate

on:
  push:
    branches: [ "dept/MEE" ]
  pull_request:
    branches: [ "dept/MEE" ]

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run linter (ESLint)
        run: npm run lint
        continue-on-error: false

      - name: Run TypeScript build check
        run: npm run build -- --dry