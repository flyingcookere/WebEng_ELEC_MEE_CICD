name: MEE DevOps Pipeline (Vite + React)

on:
  push:
    branches:
      - "main"
      - "dept/MEE"
      - "**" # Watch all branches for quality checks
  pull_request:
    branches:
      - "main" # Monitor all PRs targeting the main branch
  workflow_dispatch:

jobs:
  # --- STAGE 1: QUALITY GATE (LINT & TYPES) ---
  # This job runs on EVERY push to ensure code integrity
  quality-gate:
    runs-on: ubuntu-latest
    outputs:
      lint_output: ${{ steps.checker.outputs.lint_err }}
      tsc_output: ${{ steps.checker.outputs.tsc_err }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting and Type Checks
        id: checker
        run: |
          mkdir -p logs
          
          # 1. LINTING (Restricted to MEE specific files)
          LINT_STATUS=0
          if ! npx eslint \
            src/Pages/admin/MEEAdmin.tsx \
            src/Pages/departments/MEE.tsx \
            src/data/department/MEE.ts \
            --format stylish; then
            # Capture last 10 lines of error for PR feedback
            LINT_MSG=$(npx eslint src/Pages/admin/MEEAdmin.tsx src/Pages/departments/MEE.tsx src/data/department/MEE.ts --format stylish | tail -n 10)
            echo "lint_err<<EOF" >> $GITHUB_OUTPUT
            echo "$LINT_MSG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            LINT_STATUS=1
          fi

          # 2. TYPE-CHECKING (Project-wide verification)
          TSC_STATUS=0
          if ! npx tsc -b; then
            TSC_MSG=$(npx tsc -b | tail -n 10)
            echo "tsc_err<<EOF" >> $GITHUB_OUTPUT
            echo "$TSC_MSG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            TSC_STATUS=1
          fi

          # 3. FINAL VALIDATION
          if [ $LINT_STATUS -ne 0 ] || [ $TSC_STATUS -ne 0 ]; then
            echo "Quality gate failed. Terminating pipeline."
            exit 1
          fi

  # --- STAGE 2: BUILD AND DEPLOY ---
  # This job ONLY runs if Quality Gate passes AND we are on the MAIN branch
  build-and-deploy:
    needs: quality-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Production Docker Image
        id: docker_build
        run: |
          # Convert repository owner to lowercase for Docker compatibility
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_ID="ghcr.io/$OWNER_LOWER/webeng-mee:main"
          
          echo "Starting production build for Main branch..."
          docker build -t $IMAGE_ID .
          docker push $IMAGE_ID
          echo "IMAGE_ID=$IMAGE_ID" >> $GITHUB_ENV

      - name: Trigger Render Deployment Hook
        env:
          RENDER_URL: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_URL" ]; then
            curl -X POST "$RENDER_URL"
          else
            echo "Render Deploy Hook not found. Skipping deployment."
          fi

  # --- STAGE 3: AUTOMATIC PR FEEDBACK ---
  # Only posts comments if Stage 1 fails during a Pull Request
  feedback:
    needs: [quality-gate]
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Post Error Feedback to PR
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ❌ **MEE DevOps Gatekeeper: Build Blocked**

            ### 🔍 What exactly went wrong?

            **Linting/Code Style Issues (MEE Files):**
            ```text
            ${{ needs.quality-gate.outputs.lint_output || 'No linting errors detected.' }}
            ```

            **TypeScript/Type Issues:**
            ```text
            ${{ needs.quality-gate.outputs.tsc_output || 'No type errors detected.' }}
            ```

            ### 🛠️ Next Steps
            1. Fix the errors in your local environment.
            2. Push the changes again to this PR.

            🔗 **[View Full Debug Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**