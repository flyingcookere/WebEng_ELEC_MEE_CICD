name: MEE DevOps Pipeline (Vite + React)

on:
  push:
    branches:
      - "main"
      - "dept/MEE"
      - "**"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  # --- STAGE 1: QUALITY GATE (LINT & TYPES) ---
  quality-gate:
    runs-on: ubuntu-latest
    outputs:
      lint_output: ${{ steps.checker.outputs.lint_err }}
      tsc_output: ${{ steps.checker.outputs.tsc_err }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting and Type Checks
        id: checker
        run: |
          mkdir -p logs
          
          # 1. LINTING (MEE Files Only)
          LINT_STATUS=0
          if ! npx eslint \
            src/Pages/admin/MEEAdmin.tsx \
            src/Pages/departments/MEE.tsx \
            src/data/department/MEE.ts \
            --format stylish; then
            # Kunin ang last 10 lines ng error para sa bot
            LINT_MSG=$(npx eslint src/Pages/admin/MEEAdmin.tsx src/Pages/departments/MEE.tsx src/data/department/MEE.ts --format stylish | tail -n 10)
            echo "lint_err<<EOF" >> $GITHUB_OUTPUT
            echo "$LINT_MSG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            LINT_STATUS=1
          fi

          # 2. TYPE-CHECKING (Project-wide)
          TSC_STATUS=0
          if ! npx tsc -b; then
            TSC_MSG=$(npx tsc -b | tail -n 10)
            echo "tsc_err<<EOF" >> $GITHUB_OUTPUT
            echo "$TSC_MSG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            TSC_STATUS=1
          fi

          # 3. FINAL DECISION
          if [ $LINT_STATUS -ne 0 ] || [ $TSC_STATUS -ne 0 ]; then
            echo "Quality gate failed. Check PR comments for details."
            exit 1
          fi

  # --- STAGE 2: BUILD, TEST, AND DEPLOY ---
  build-and-deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        id: docker_build
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # Tag will always be 'main' for the production image
          IMAGE_ID="ghcr.io/$OWNER_LOWER/webeng-mee:main"
          
          # --- LOGIC START ---
          # 1. KUNG ang branch ay 'main' at ito ay isang PUSH (including Merge), mag-BU-BUILD at PUSH tayo.
          if [[ "${{ github.ref }}" == "refs/heads/main" && "${{ github.event_name }}" == "push" ]]; then
            echo "Branch is Main. Starting Production Build..."
            docker build -t $IMAGE_ID .
            docker push $IMAGE_ID
            echo "DEPLOY_READY=true" >> $GITHUB_ENV
          else
            # 2. KUNG nasa dept/MEE ka, lalaktawan natin ang Build/Deploy stage.
            echo "🚧 Working on Branch: ${{ github.ref_name }}. Skipping Build and Deploy for now."
            echo "DEPLOY_READY=false" >> $GITHUB_ENV
          fi

      - name: Trigger Render Deployment
        if: env.DEPLOY_READY == 'true' && success()
        env:
          RENDER_URL: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_URL" ]; then
            curl -X POST "$RENDER_URL"
          else
            echo "Render Hook not set, skipping..."
          fi

  # --- STAGE 3: AUTOMATIC ERROR FEEDBACK ---
  feedback:
    needs: [quality-gate]
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Post Error Feedback to PR
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ❌ **MEE DevOps Gatekeeper: Build Blocked**

            ### 🔍 What exactly went wrong?

            **Linting/Code Style Issues (MEE Files):**
            ```text
            ${{ needs.quality-gate.outputs.lint_output || 'No linting errors detected.' }}
            ```

            **TypeScript/Type Issues:**
            ```text
            ${{ needs.quality-gate.outputs.tsc_output || 'No type errors detected.' }}
            ```

            ### 🛠️ Next Steps
            1. Fix the errors in your local environment.
            2. Push the changes again to this PR.

            🔗 **[Full Debug Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**